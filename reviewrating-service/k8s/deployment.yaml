apiVersion: apps/v1
kind: Deployment
metadata:
  name: review-rating-service
  labels:
    app: review-rating-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: review-rating-service
  template:
    metadata:
      labels:
        app: review-rating-service
    spec:
      containers:
      - name: review-rating-service
        image: my-registry/review-rating-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8008
        env:
        - name: DB_HOST
          value: "mongodb-cluster"