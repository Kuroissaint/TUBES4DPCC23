apiVersion: apps/v1
kind: Deployment
metadata:
  name: pricing-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pricing-service
  template:
    metadata:
      labels:
        app: pricing-service
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: pricing-service
          image: pricingfinance.azurecr.io/pricing-service:latest
          ports:
            - containerPort: 8087
          env:
            - name: DB_URL
              value: "postgres://kantin_admin:kantin123@postgres-service:5432/pricing_service_db?sslmode=disable"
---
apiVersion: v1
kind: Service
metadata:
  name: pricing-service
spec:
  type: LoadBalancer
  selector:
    app: pricing-service
  ports:
    - protocol: TCP
      port: 8087
      targetPort: 8087