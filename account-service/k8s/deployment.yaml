apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
  labels:
    app: account-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: account-service

  template:
    metadata:
      labels:
        app: account-service

    spec:
      containers:
      - name: account-service
        image: firdaaridzkii/account-service:latest

        ports:
        - containerPort: 8081

        env:
        - name: DB_HOST
          value: "db-postgres-service"

        - name: DB_NAME
          value: "db_account_service"

        - name: DB_USER
          value: "postgres"

        - name: DB_PASSWORD
          value: "password"
