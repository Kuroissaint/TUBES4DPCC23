apiVersion: apps/v1
kind: Deployment
metadata:
  name: translog-service
  labels:
    app: translog-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: translog-service
  template:
    metadata:
      labels:
        app: translog-service
    spec:
      containers:
      - name: translog-service
        image: my-registry/translog-service:latest
        ports:
        - containerPort: 8085
        env:
        - name: DATABASE_URL
          value: "postgresql://postgres.mymsipxzqzdomulumweg:kuroissaintdb@aws-1-ap-northeast-1.pooler.supabase.com:6543/postgres?pgbouncer=true"
        - name: DB_HOST
          value: "db-postgres-service"
        - name: DB_NAME
          value: "db_transport_order"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: "password"