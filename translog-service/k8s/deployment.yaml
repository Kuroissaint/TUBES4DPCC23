apiVersion: apps/v1
kind: Deployment
metadata:
  name: translog-service
  labels:
    app: translog-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: translog-service
  template:
    metadata:
      labels:
        app: translog-service
    spec:
      containers:
      - name: translog-service
        image: kelcloud23/translog-service:latest
        ports:
        - containerPort: 8085
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DATABASE_URL