apiVersion: apps/v1
kind: Deployment
metadata:
  name: location-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: location-service
  template:
    metadata:
      labels:
        app: location-service
    spec:
      containers:
      - name: location-service
        # Ganti ACKTUBES dengan nama Azure Container Registry kelompokmu nanti
        image: acktubes.azurecr.io/location-service:latest
        ports:
        - containerPort: 8002
        env:
        - name: SERVICE_PORT
          value: "8002"
---
apiVersion: v1
kind: Service
metadata:
  name: location-service-cluster
spec:
  type: ClusterIP
  ports:
  - port: 8002
    targetPort: 8002
  selector:
    app: location-service