apiVersion: apps/v1
kind: Deployment
metadata:
  name: communication-service
  labels:
    app: communication-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: communication-service
  template:
    metadata:
      labels:
        app: communication-service
    spec:
      containers:
      - name: communication-service
        image: my-registry/communication-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8005
        env:
        - name: DB_HOST
          value: "cassandra-cluster" # Nama database